services:

  app:
    build: .
    container_name: portfolio-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - LOG_LEVEL=info
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - portfolio-net
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: portfolio-db
    environment:
      - POSTGRES_DB=portfolio
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - portfolio-net
    restart: unless-stopped

networks:
  portfolio-net:
    driver: bridge

volumes:
  pgdata:
